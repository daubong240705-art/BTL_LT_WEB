services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: luoiflix-backend:latest
    container_name: luoiflix_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://192.168.10.207:3306/luoiflix_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: dev
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      MOVIEAPP_JWT_SECRET: iUCmH86Xgl4R6QRi5HODh3tov6sQ2FD8PFFLFFlOdSq1uReDgPMxzhW9qaWaByA/DKwwUAmW2H9mhsuUpoUCZA==
      MOVIEAPP_JWT_ACCESS_TOKEN: "8640000"
      MOVIEAPP_JWT_REFRESH_TOKEN: "8640000"
      MOVIEAPP_FRONTEND_URL: http://localhost,http://localhost:3000
      LUOIFILIX_UPLOAD_FILE_BASE_PATH: file:///app/uploads/
      CLOUDINARY_CLOUD_NAME: de5eiayqo
      CLOUDINARY_API_KEY: 389914966887368
      CLOUDINARY_API_SECRET: uTvzbsk-5h380Cog5n3VtcB_jGU
    volumes:
      - ./data/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: /api/v1
    image: luoiflix-frontend:latest
    container_name: luoiflix_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BACKEND_URL: /api/v1
      BACKEND_INTERNAL_URL: http://backend:8080/api/v1
    ports:
      - "3000:3000"

  nginx:
    image: nginx:latest
    container_name: luoiflix_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
