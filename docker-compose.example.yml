services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: luoiflix-backend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/luoiflix_db
      SPRING_DATASOURCE_USERNAME: luoiflix
      SPRING_DATASOURCE_PASSWORD: change-me
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      MOVIEAPP_JWT_SECRET: replace-with-base64-secret
      MOVIEAPP_JWT_ACCESS_TOKEN: "8640000"
      MOVIEAPP_JWT_REFRESH_TOKEN: "8640000"
      MOVIEAPP_FRONTEND_URL: https://app.example.com
      LUOIFILIX_UPLOAD_FILE_BASE_PATH: file:/app/uploads/
    volumes:
      - ./data/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: /api/v1
    image: luoiflix-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BACKEND_URL: /api/v1
      BACKEND_INTERNAL_URL: http://backend:8080/api/v1
    ports:
      - "3000:3000"
